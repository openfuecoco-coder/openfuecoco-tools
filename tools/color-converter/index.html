<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color Converter | Hex to RGB/HSL - Open Fuecoco Tools</title>
    <meta name="description" content="Convert Hex color codes to RGB and HSL formats instantly with this free developer tool.">
    <link rel="stylesheet" href="../../shared/style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Color Converter",
      "description": "Convert Hex colors to RGB and HSL.",
      "applicationCategory": "DeveloperTool"
    }
    </script>
</head>
<body><nav style="padding:10px;"><a href="../../index.html" style="border:none; background:#E8E4D9;"><body>larr; 回首頁</a></nav>
    <div class="container">
        <h1>Color Converter</h1>
        <label for="hex">Enter Hex Color:</label>
        <input type="text" id="hex" placeholder="#FFFFFF" oninput="convert()">
        <div id="color-preview" style="width: 100px; height: 100px; border: 1px solid #ccc; margin: 10px 0; background-color: #FFFFFF;"></div>
        <p id="rgb">RGB: -</p>
        <p id="hsl">HSL: -</p>
        
        <h2>How to use</h2>
        <p>Type a hex color code (e.g., #FF5733) to see the equivalent RGB and HSL values.</p>
        
        <h2>Example input</h2>
        <p>#FF5733</p>

        <h2>Common mistakes</h2>
        <p>Forgetting the '#' symbol or using non-hex characters.</p>

        <h2>Related tools</h2>
        <p><a href="../json-formatter/">JSON Formatter</a></p>
    </div>
    <script>
        function convert() {
            const input = document.getElementById('hex').value;
            const hex = input.startsWith('#') ? input : '#' + input;
            
            if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                document.getElementById('color-preview').style.backgroundColor = hex;
                
                const r = parseInt(hex.substring(1, 3), 16);
                const g = parseInt(hex.substring(3, 5), 16);
                const b = parseInt(hex.substring(5, 7), 16);
                
                document.getElementById('rgb').innerText = `RGB: rgb(${r}, ${g}, ${b})`;
                
                // Simplified HSL
                const rNorm = r / 255, gNorm = g / 255, bNorm = b / 255;
                const max = Math.max(rNorm, gNorm, bNorm), min = Math.min(rNorm, gNorm, bNorm);
                let h, s, l = (max + min) / 2;
                if (max === min) { h = s = 0; }
                else {
                    const d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case rNorm: h = (gNorm - bNorm) / d + (gNorm < bNorm ? 6 : 0); break;
                        case gNorm: h = (bNorm - rNorm) / d + 2; break;
                        case bNorm: h = (rNorm - gNorm) / d + 4; break;
                    }
                    h /= 6;
                }
                document.getElementById('hsl').innerText = `HSL: hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
            }
        }
    </script>
    <script src="../../shared/ads.js"></script>
</body>
</html>
