<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASCII Table Reference | Fueco Tools</title>
    <meta name="description" content="Complete ASCII table reference chart including decimal, hexadecimal, and character representations.">
    <link rel="stylesheet" href="../../shared/style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ASCII Table Reference",
      "description": "Reference chart for ASCII characters.",
      "applicationCategory": "DeveloperTool",
      "operatingSystem": "All",
      "offers": { "@type": "Offer", "price": "0" },
      "url": "https://example.com/tools/ascii-table/"
    }
    </script>
</head>
<body>
    <div class="container">
        <h1>ASCII Table</h1>
        <table style="width:100%; border-collapse:collapse; background:#fff;">
            <thead><tr><th>Dec</th><th>Hex</th><th>Char</th><th>Name</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
        <h2>How to use</h2>
        <p>Browse the table for character codes. Useful for debugging communication protocols.</p>
        <h2>Related tools</h2>
        <a href="../hex-dec-converter/">Hex/Dec Converter</a>
    </div>
    <script>
        const tbody = document.getElementById('tableBody');
        for (let i = 0; i < 128; i++) {
            const row = document.createElement('tr');
            let char = String.fromCharCode(i);
            let name = i < 32 ? "Control" : (i === 32 ? "Space" : (i === 127 ? "DEL" : char));
            row.innerHTML = '<td style="border:1px solid #C4B5A5; padding:8px; text-align:center;">'+i+'</td><td style="border:1px solid #C4B5A5; padding:8px; text-align:center;">0x'+i.toString(16).toUpperCase().padStart(2, '0')+'</td><td style="border:1px solid #C4B5A5; padding:8px; text-align:center;">'+(i < 33 || i === 127 ? '' : char)+'</td><td style="border:1px solid #C4B5A5; padding:8px; text-align:center;">'+name+'</td>';
            tbody.appendChild(row);
        }
    </script>
</body>
</html>
