<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Timestamp Converter</title><link rel="stylesheet" href="../../shared/style.css"></head>
<body><div class="container"><h1>Timestamp</h1><input type="number" id="input" oninput="convert()"><div id="output" style="margin-top:10px;"></div></div>
<script>
    function convert(){ document.getElementById('output').innerText = new Date(parseInt(document.getElementById('input').value)*1000).toLocaleString(); }
</script></body></html>
