<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timestamp Converter | Open Fuecoco Tools</title>
    <meta name="description" content="Convert Unix timestamps (seconds or milliseconds) to human-readable dates.">
    <link rel="stylesheet" href="../../shared/style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Timestamp Converter",
      "description": "Convert Unix epoch (seconds/milliseconds) to date.",
      "applicationCategory": "DeveloperTool",
      "operatingSystem": "All",
      "offers": { "@type": "Offer", "price": "0" },
      "url": "https://openfuecoco-coder.github.io/openfuecoco-tools/tools/timestamp-converter/"
    }
    </script>
</head>
<body><nav style="padding:10px;"><a href="../../index.html" style="border:none; background:#E8E4D9;"><body>larr; 回首頁</a></nav>
    <div class="container">
        <h1>Timestamp Converter</h1>
        <input type="number" id="input" oninput="convert()" placeholder="Enter Timestamp" style="width:100%; padding:8px;">
        <select id="unit" onchange="convert()" style="margin-top:10px;">
            <option value="s">Seconds (s)</option>
            <option value="ms">Milliseconds (ms)</option>
        </select>
        <div id="output" style="margin-top:10px; padding:10px; background:#fff; border:1px solid #C4B5A5;">Result...</div>
        
        <h2>How to use</h2>
        <p>Input a Unix timestamp and select whether it is in seconds or milliseconds.</p>

        <h2>Related tools</h2>
        <a href="../json-formatter/">JSON Formatter</a>
    </div>
    <script>
        function convert(){ 
            let t = parseInt(document.getElementById('input').value);
            let unit = document.getElementById('unit').value;
            let date = unit === 'ms' ? new Date(t) : new Date(t * 1000);
            document.getElementById('output').innerText = isNaN(t) ? 'Invalid input' : date.toLocaleString(); 
        }
    </script>
</body>
</html>
