<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Base64 Converter</title><link rel="stylesheet" href="../../shared/style.css"></head>
<body><div class="container"><h1>Base64 Converter</h1><textarea id="input" rows="4"></textarea><button onclick="encode()">Encode</button><button onclick="decode()">Decode</button><div id="output" style="margin-top:10px; padding:10px; background:#fff;"></div></div>
<script>
    function encode(){ document.getElementById('output').innerText = btoa(document.getElementById('input').value); }
    function decode(){ try { document.getElementById('output').innerText = atob(document.getElementById('input').value); } catch(e) { document.getElementById('output').innerText = 'Error'; } }
</script></body></html>
