<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>URL Encoder</title><link rel="stylesheet" href="../../shared/style.css"></head>
<body><div class="container"><h1>URL Encoder</h1><input type="text" id="input" oninput="convert()"><div id="output" style="margin-top:10px;"></div></div>
<script>
    function convert(){ document.getElementById('output').innerText = encodeURIComponent(document.getElementById('input').value); }
</script></body></html>
