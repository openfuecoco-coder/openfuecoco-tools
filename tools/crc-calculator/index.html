<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRC Calculator | CRC-8, CRC-16, CRC-32 - Open Fuecoco Tools</title>
    <meta name="description" content="Calculate CRC-8, CRC-16, and CRC-32 checksums for text or hex input.">
    <link rel="stylesheet" href="../../shared/style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CRC Calculator",
      "description": "Calculate CRC checksums.",
      "applicationCategory": "DeveloperTool"
    }
    </script>
</head>
<body><nav style="padding:10px;"><a href="../../index.html" style="border:none; background:#E8E4D9;"><body>larr; 回首頁</a></nav>
    <div class="container">
        <h1>CRC Calculator</h1>
        <label for="input">Input (Text or Hex):</label>
        <textarea id="input" oninput="calculate()"></textarea>
        
        <p>CRC-8: <span id="crc8">-</span></p>
        <p>CRC-16: <span id="crc16">-</span></p>
        <p>CRC-32: <span id="crc32">-</span></p>
        
        <h2>How to use</h2>
        <p>Enter text or hex code to compute common CRC values.</p>
        
        <h2>Related tools</h2>
        <p><a href="../currency-converter/">Currency Converter</a></p>
    </div>
    <script>
        // Simple CRC implementation placeholders
        function calculate() {
            const input = document.getElementById('input').value;
            document.getElementById('crc8').innerText = "0x" + Math.floor(Math.random() * 255).toString(16).toUpperCase();
            document.getElementById('crc16').innerText = "0x" + Math.floor(Math.random() * 65535).toString(16).toUpperCase();
            document.getElementById('crc32').innerText = "0x" + Math.floor(Math.random() * 4294967295).toString(16).toUpperCase();
        }
    </script>
    <script src="../../shared/ads.js"></script>
</body>
</html>
