<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 表格產生器 | Markdown Table Generator | Fueco Tools</title>
    <meta name="description" content="輕鬆將文字資料轉換為標準 Markdown 表格格式。">
    <link rel="stylesheet" href="../../shared/style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Markdown 表格產生器",
      "description": "線上工具，將普通文字內容轉換為Markdown表格，方便快速編輯。",
      "applicationCategory": "DeveloperTool"
    }
    </script>
</head>
<body><nav style="padding:10px;"><a href="../../index.html" style="border:none; background:#E8E4D9;"><body>larr; 回首頁</a></nav>
    <div class="container">
        <h1>Markdown 表格產生器</h1>
        <p>請在下方輸入您的資料，每行代表一行，以逗號、分號或Tab鍵分隔各欄位。</p>
        <textarea id="input" rows="10" placeholder="輸入資料，例如：
Header1,Header2,Header3
Row1Col1,Row1Col2,Row1Col3
Row2Col1,Row2Col2,Row2Col3"></textarea>
        <button onclick="generateMarkdownTable()">生成 Markdown 表格</button>
        <textarea id="output" rows="10" readonly></textarea>

        <section>
            <h2>使用說明</h2>
            <p>1. 在上方輸入框貼上或輸入您的資料。<br>2. 每行代表表格的一列。<br>3. 欄位之間請使用逗號 (,)、分號 (;) 或 Tab 鍵分隔。<br>4. 點擊「生成 Markdown 表格」按鈕即可在下方輸出框看到結果。</p>
        </section>
    </div>
    <script>
        function generateMarkdownTable() {
            const input = document.getElementById('input').value;
            const lines = input.trim().split('\n');
            if (lines.length === 0 || lines[0] === '') {
                document.getElementById('output').value = '';
                return;
            }

            // Determine separator
            let separator = ',';
            if (lines[0].includes('\t')) separator = '\t';
            else if (lines[0].includes(';')) separator = ';';
            else if (lines[0].includes(',')) separator = ',';

            const cells = lines.map(line => line.split(separator));

            // Calculate max column widths
            const numCols = cells[0].length;
            const colWidths = Array(numCols).fill(0);
            cells.forEach(row => {
                row.forEach((cell, i) => {
                    colWidths[i] = Math.max(colWidths[i], (cell ? cell.trim().length : 0));
                });
            });

            let output = '';

            // Header
            output += '| ' + cells[0].map((cell, i) => (cell ? cell.trim().padEnd(colWidths[i]) : '').padEnd(colWidths[i])).join(' | ') + ' |\n';

            // Separator line
            output += '| ' + colWidths.map(width => '-'.repeat(width)).join(' | ') + ' |\n';

            // Body
            for (let i = 1; i < cells.length; i++) {
                output += '| ' + cells[i].map((cell, j) => (cell ? cell.trim().padEnd(colWidths[j]) : '').padEnd(colWidths[j])).join(' | ') + ' |\n';
            }

            document.getElementById('output').value = output.trim();
        }
    </script>
</body>
</html>
